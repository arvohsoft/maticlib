[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --cov=maticlib
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    -v
markers =
    unit: Unit tests
    integration: Integration tests
    async_test: Async operation tests
    real_api: Real API integration tests (requires --real-api flag)
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning